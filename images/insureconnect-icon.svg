<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#372f9e"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M100,18 C100,18 138,28 168,42 L168,110 C168,150 138,176 100,194 C62,176 32,150 32,110 L32,42 C62,28 100,18 100,18 Z"/>
